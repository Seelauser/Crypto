services:
  - type: web
    name: orderflow-analytics
    runtime: node
    plan: starter
    buildCommand: pnpm install && cd packages/db && pnpm prisma generate && cd ../.. && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          type: web
          name: orderflow-analytics
          property: renderHostname
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: orderflow-analytics
          property: renderHostname
      - key: DATABASE_URL
        fromDatabase:
          name: orderflow-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: orderflow-redis
          property: connectionString
      - key: NEXTAUTH_SECRET
        sync: false

databases:
  - name: orderflow-db
    databaseName: orderflow
    user: postgres
    plan: starter
  - name: orderflow-redis
    plan: starter
